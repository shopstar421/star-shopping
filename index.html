<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAR STORE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Cairo}
body{background:#fcfcfc}
header{display:flex;justify-content:space-between;padding:15px;background:#fff;border-bottom:1px solid #eee}
.cart{background:#000;color:#fff;padding:8px 15px;border-radius:20px;cursor:pointer}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;padding:20px}
.card{background:#fff;border:1px solid #eee;border-radius:10px;overflow:hidden}
.card img{width:100%;height:250px;object-fit:cover}
.info{padding:10px}
button{width:100%;padding:10px;background:#000;color:#fff;border:none;margin-top:10px}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;display:none;justify-content:center;align-items:center}
.box{background:#fff;padding:20px;width:90%;max-width:400px}
</style>
</head>

<body>

<header>
<h2>STAR</h2>
<div class="cart" onclick="toggleCart()">🛒 <span id="count">0</span></div>
</header>

<div class="grid" id="products">جاري التحميل...</div>

<div class="modal" id="cartBox">
<div class="box">
<h3>السلة</h3>
<div id="items"></div>
<p>الإجمالي: <span id="total">0</span> + 70</p>

<form id="order">
<input id="name" placeholder="الاسم" required>
<input id="phone" placeholder="رقمك" required>
<input id="addr" placeholder="العنوان" required>

<select id="pay">
<option value="">طريقة الدفع</option>
<option value="cash">كاش</option>
<option value="vodafone">فودافون/انستا</option>
<option value="etisalat">اتصالات</option>
</select>

<div id="note" style="display:none;color:red;font-size:12px">
حول وابعتي اسكرين واتساب  
<a href="https://wa.me/201105932868">01105932868</a>
</div>

<button>اطلب</button>
</form>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDq6x2sA7DlFrCHVqpjOROsFUYPH3Rcpts",
projectId:"starstore-4b932"
});

const db=getFirestore(app);

let all=[],cart=[];

onSnapshot(collection(db,"products"), snap=>{
all=[];
snap.forEach(d=>all.push(d.data()));
show();
});

function show(){
let html="";
all.forEach(p=>{
html+=`
<div class="card">
<img src="${p.image}">
<div class="info">
<h4>${p.name}</h4>
<p>${p.price} ج</p>
<button onclick="add('${p.name}',${p.price})">أضف</button>
</div>
</div>`;
});
document.getElementById("products").innerHTML=html||"لا يوجد منتجات";
}

window.add=(n,p)=>{
cart.push({n,p});
update();
}

function update(){
document.getElementById("count").innerText=cart.length;
let t=0,h="";
cart.forEach(i=>{
t+=parseInt(i.p);
h+=`<div>${i.n} - ${i.p}</div>`;
});
document.getElementById("items").innerHTML=h;
document.getElementById("total").innerText=t;
}

window.toggleCart=()=>{
let m=document.getElementById("cartBox");
m.style.display=m.style.display=="flex"?"none":"flex";
}

document.getElementById("pay").onchange=function(){
document.getElementById("note").style.display=
(this.value=="vodafone"||this.value=="etisalat")?"block":"none";
}

document.getElementById("order").onsubmit=e=>{
e.preventDefault();

let msg="طلب جديد:\n";
msg+=document.getElementById("name").value+"\n";
msg+=document.getElementById("phone").value+"\n";

cart.forEach(i=> msg+=i.n+" - "+i.p+"\n");

window.open("https://wa.me/201105932868?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
