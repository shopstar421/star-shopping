<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إدارة STAR STORE</title>

<style>
body { font-family: Cairo; background:#f4f4f4; text-align:center; }
.box { background:#fff; padding:20px; border-radius:10px; max-width:400px; margin:auto; margin-top:50px; }
input,select,button { width:100%; padding:10px; margin:10px 0; }
button { background:#27ae60; color:#fff; border:none; }
</style>
</head>

<body>

<script>
const PASSWORD = "1234";

if (localStorage.getItem("auth") !== "yes") {
    const entered = prompt("ادخل باسورد الادمن");
    if (entered === PASSWORD) {
        localStorage.setItem("auth", "yes");
    } else {
        document.body.innerHTML = "<h2>غير مصرح</h2>";
    }
}
</script>

<div class="box">
<h2>إضافة منتج</h2>

<form id="pForm">
<input id="n" placeholder="اسم المنتج" required>
<input id="p" placeholder="السعر" required>

<select id="c">
<option>إكسسوارات</option>
<option>شنط</option>
<option>نضارات</option>
<option>ملابس أطفال</option>
<option>ملابس حريمي</option>
<option>ملابس رجالي</option>
<option>أحذية</option>
<option>مستحضرات تجميل</option>
</select>

<input type="file" id="i" required>

<button>نشر المنتج</button>
</form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDq6x2sA7DlFrCHVqpjOROsFUYPH3Rcpts",
  authDomain: "starstore-4b932.firebaseapp.com",
  projectId: "starstore-4b932",
  storageBucket: "starstore-4b932.appspot.com",
  messagingSenderId: "285327083767",
  appId: "1:285327083767:web:1851756694916f5320abf2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("pForm").onsubmit = async (e) => {
    e.preventDefault();

    const name = document.getElementById("n").value;
    const price = document.getElementById("p").value;
    const category = document.getElementById("c").value;
    const file = document.getElementById("i").files[0];

    const reader = new FileReader();

    reader.onload = async () => {
        try {
            await addDoc(collection(db, "products"), {
                name,
                price,
                category,
                image: reader.result,
                createdAt: Date.now(),
                soldOut: false
            });

            alert("تم إضافة المنتج ✅");
            document.getElementById("pForm").reset();

        } catch (err) {
            alert("خطأ: " + err.message);
        }
    };

    reader.readAsDataURL(file);
};
</script>

</body>
</html>
