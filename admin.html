<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة STAR STORE</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { background: #f4f4f4; padding: 20px; text-align: center; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        .btn { background: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>إضافة منتج جديد</h2>
    <form id="pForm">
        <input type="text" id="n" placeholder="اسم المنتج" required>
        <input type="number" id="p" placeholder="السعر" required>
        <input type="text" id="c" placeholder="الكود">
        <input type="file" id="i" accept="image/*" required>
        <button type="submit" class="btn" id="sub">نشر المنتج الآن</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, collection, addDoc } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyDq6x2sA7DlFrCHVqpjOROsFUYPH3Rcpts",
        authDomain: "://firebaseapp.com",
        projectId: "starstore-4b932",
        storageBucket: "starstore-4b932.firebasestorage.app",
        messagingSenderId: "285327083767",
        appId: "1:285327083767:web:1851756694916f5320abf2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('pForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sub');
        btn.innerText = "جاري الرفع...";
        btn.disabled = true;

        const reader = new FileReader();
        reader.onload = async (event) => {
            try {
                await addDoc(collection(db, "products"), {
                    name: document.getElementById('n').value,
                    price: document.getElementById('p').value,
                    code: document.getElementById('c').value,
                    image: event.target.result,
                    createdAt: Date.now()
                });
                alert("مبروك! المنتج نزل على الموقع");
                location.reload();
            } catch (err) {
                alert("خطأ: " + err.message);
                btn.disabled = false;
                btn.innerText = "نشر المنتج الآن";
            }
        };
        reader.readAsDataURL(document.getElementById('i').files[0]);
    };
</script>
</body>
</html>
