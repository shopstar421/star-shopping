<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ADMIN</title>
</head>

<body>

<script>
if(sessionStorage.getItem("auth")!=="yes"){
let p=prompt("الباسورد");
if(p==="1234"){
sessionStorage.setItem("auth","yes");
}else{
document.body.innerHTML="غير مصرح";
}
}
</script>

<h2>إضافة منتج</h2>

<form id="f">
<input id="n" placeholder="اسم">
<input id="p" placeholder="سعر">
<input id="c" placeholder="قسم">
<input type="file" id="img">
<button>حفظ</button>
</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIza...",
projectId: "starstore-4b932"
});

const db = getFirestore(app);

document.getElementById("f").onsubmit=e=>{
e.preventDefault();

let file=document.getElementById("img").files[0];
let reader=new FileReader();

reader.onload=async e=>{
await addDoc(collection(db,"products"),{
name:document.getElementById("n").value,
price:document.getElementById("p").value,
category:document.getElementById("c").value,
image:e.target.result,
createdAt:Date.now()
});

alert("تم");
location.reload();
}

reader.readAsDataURL(file);
}
</script>

</body>
</html>
