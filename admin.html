<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة STAR STORE</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h2, h3 { margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; outline: none; }
        input:focus { border-color: #000; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #f4f4f4; font-size: 14px; }
        .btn-sold { background: #f39c12; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; margin: 2px; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; margin: 2px; }
        .status-on { color: #27ae60; font-weight: bold; }
        .status-off { color: #e74c3c; font-weight: bold; }
        .img-table { border-radius: 5px; object-fit: cover; }
    </style>
</head>
<body>

<div class="container">
    <h2>إضافة منتج جديد - STAR STORE</h2>
    <form id="productForm">
        <div class="form-grid">
            <div><label>اسم المنتج</label><input type="text" id="pName" required></div>
            <div><label>كود المنتج</label><input type="text" id="pCode" placeholder="مثلاً: A101" required></div>
            <div><label>السعر (ج.م)</label><input type="number" id="pPrice" required></div>
            <div>
                <label>القسم</label>
                <select id="pCat">
                    <option>إكسسوارات</option>
                    <option>شنط</option>
                    <option>نضارات</option>
                    <option>ملابس أطفال</option>
                    <option>ملابس حريمي</option>
                    <option>ملابس رجالي</option>
                    <option>أحذية</option>
                    <option>مستحضرات تجميل</option>
                </select>
            </div>
            <div><label>صورة المنتج</label><input type="file" id="pImage" accept="image/*" required></div>
        </div>
        <textarea id="pDesc" placeholder="وصف قصير للمنتج..." rows="2"></textarea>
        <button type="submit" class="btn-add">إضافة المنتج للموقع الآن</button>
    </form>

    <div style="margin-top: 50px; overflow-x: auto;">
        <h3>إدارة المنتجات المنشورة</h3>
        <table id="adminTable">
            <thead>
                <tr>
                    <th>الصورة</th>
                    <th>الاسم</th>
                    <th>الكود</th>
                    <th>الحالة</th>
                    <th>التحكم</th>
                </tr>
            </thead>
            <tbody id="adminList"></tbody>
        </table>
    </div>
</div>

<script>
    // حماية الدخول بالباسورد الجديد
    let pass = prompt("أدخل كلمة المرور للإدارة:");
    if(pass !== "mmaahh123") { 
        alert("كلمة المرور خاطئة!");
        window.location.href="index.html"; 
    }

    const form = document.getElementById('productForm');

    // دالة لعرض المنتجات في جدول الإدارة
    function renderAdmin() {
        const products = JSON.parse(localStorage.getItem('myProducts')) || [];
        const list = document.getElementById('adminList');
        list.innerHTML = "";
        
        products.forEach((p, index) => {
            list.innerHTML += `
                <tr>
                    <td><img src="${p.image}" class="img-table" width="50" height="50"></td>
                    <td>${p.name}</td>
                    <td>${p.code || '---'}</td>
                    <td class="${p.soldOut ? 'status-off' : 'status-on'}">${p.soldOut ? 'نفذت الكمية' : 'متوفر'}</td>
                    <td>
                        <button class="btn-sold" onclick="toggleSold(${index})">تبديل الحالة</button>
                        <button class="btn-del" onclick="deleteProduct(${index})">حذف</button>
                    </td>
                </tr>`;
        });
    }

    // معالجة إضافة المنتج مع ضغط الصورة
    form.onsubmit = function(e) {
        e.preventDefault();
        const fileInput = document.getElementById('pImage');
        if (fileInput.files.length === 0) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                // تقليل حجم الصورة برمجياً لضمان عدم امتلاء الذاكرة
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 500; 
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // تحويل الصورة لـ JPEG مضغوط بنسبة 70%
                const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);

                const products = JSON.parse(localStorage.getItem('myProducts')) || [];
                products.push({
                    name: document.getElementById('pName').value,
                    code: document.getElementById('pCode').value,
                    price: document.getElementById('pPrice').value,
                    category: document.getElementById('pCat').value,
                    desc: document.getElementById('pDesc').value,
                    image: compressedDataUrl,
                    soldOut: false
                });

                try {
                    localStorage.setItem('myProducts', JSON.stringify(products));
                    form.reset();
                    renderAdmin();
                    alert("تم إضافة المنتج بنجاح!");
                } catch (error) {
                    alert("عذراً، مساحة التخزين ممتلئة. يرجى حذف بعض المنتجات القديمة.");
                }
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(fileInput.files[0]);
    };

    function deleteProduct(i) {
        if(confirm("هل أنت متأكد من حذف هذا المنتج؟")) {
            let products = JSON.parse(localStorage.getItem('myProducts'));
            products.splice(i, 1);
            localStorage.setItem('myProducts', JSON.stringify(products));
            renderAdmin();
        }
    }

    function toggleSold(i) {
        let products = JSON.parse(localStorage.getItem('myProducts'));
        products[i].soldOut = !products[i].soldOut;
        localStorage.setItem('myProducts', JSON.stringify(products));
        renderAdmin();
    }

    window.onload = renderAdmin;
</script>
</body>
</html>
